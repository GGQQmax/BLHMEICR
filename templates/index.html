<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Table & Categorization Dashboard</title>
  <style>
    /* Premium Dark Theme variables */
    :root {
      --bg-color: #0b0f19;
      --card-bg: #151d30;
      --card-border: #23314f;
      --text-color: #e2e8f0;
      --text-muted: #94a3b8;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --danger-color: #ef4444;
      --danger-hover: #dc2626;
      --success-color: #10b981;
      --accent-color: #8b5cf6;
      --font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-family);
      margin: 0;
      padding: 24px;
      line-height: 1.5;
    }

    h1,
    h2,
    h3 {
      margin-top: 0;
      font-weight: 700;
      color: #ffffff;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--card-border);
    }

    .status-badge {
      background-color: #1e293b;
      border: 1px solid var(--card-border);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    #result {
      color: var(--text-color);
      font-weight: 600;
    }

    .dashboard-layout {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .left-panel {
      flex: 3;
      min-width: 600px;
    }

    .right-panel {
      flex: 1;
      min-width: 350px;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .stat-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-card {
      flex: 1;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .stat-val {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary-color);
      margin-top: 4px;
    }

    .controls {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
    }

    select,
    input {
      background-color: #0f172a;
      border: 1px solid var(--card-border);
      color: var(--text-color);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      box-sizing: border-box;
    }

    select:focus,
    input:focus {
      border-color: var(--primary-color);
    }

    button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background-color: #334155;
    }

    .btn-secondary:hover {
      background-color: #475569;
    }

    .btn-danger {
      background-color: var(--danger-color);
    }

    .btn-danger:hover {
      background-color: var(--danger-hover);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 14px;
    }

    th {
      background-color: #0f172a;
      color: var(--text-muted);
      font-weight: 600;
      padding: 12px 16px;
      border-bottom: 2px solid var(--card-border);
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--card-border);
      color: var(--text-color);
    }

    tr:hover td {
      background-color: #1e293b;
    }

    a {
      color: var(--primary-color);
      text-decoration: none;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.2s;
    }

    a:hover {
      color: var(--accent-color);
      text-decoration: underline;
    }

    .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      background-color: #312e81;
      color: #c7d2fe;
    }

    .type-badge.empty {
      background-color: #1e293b;
      border: 1px dashed var(--card-border);
      color: var(--text-muted);
      font-weight: 500;
    }

    .type-badge.empty:hover {
      background-color: var(--primary-color);
      color: white;
      border-style: solid;
      border-color: var(--primary-color);
    }

    .mapping-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .scroll-container {
      max-height: 450px;
      overflow-y: auto;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      background-color: #0f172a;
    }

    .scroll-container::-webkit-scrollbar {
      width: 6px;
    }

    .scroll-container::-webkit-scrollbar-track {
      background: #0f172a;
    }

    .scroll-container::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }

    .mapping-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--card-border);
    }

    .mapping-item:last-child {
      border-bottom: none;
    }

    .mapping-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-width: 70%;
    }

    .mapping-seller {
      font-size: 13px;
      font-weight: 600;
      word-break: break-all;
    }

    .mapping-type {
      font-size: 11px;
      color: var(--text-muted);
    }

    .search-box {
      margin-bottom: 10px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="container">
    <div class="header-bar">
      <h1>Invoice & Categorization Dashboard</h1>
      <div class="status-badge">
        Status: <span id="result">{{ result.result | default('Loaded previous result.') }}</span>
      </div>
    </div>

    <div class="dashboard-layout">
      <!-- Left Panel: Invoices Table & Stats -->
      <div class="left-panel">
        <div class="card">
          <div class="stat-row">
            <div class="stat-card">
              <label>Total Amount</label>
              <div class="stat-val">$<span id="total">0</span></div>
            </div>
          </div>

          <div class="controls">
            <div class="form-group" style="flex: 1; min-width: 200px;">
              <label for="monthSelect">Billing Month</label>
              <select id="monthSelect" onchange="onMonthChange()">
                <option value="">Fetch Live API (Current Month)</option>
              </select>
            </div>
            <button onclick="runScript()" id="updateBtn">Update Table</button>
          </div>

          <h2>Invoice List</h2>
          <table id="invoiceTable">
            <thead>
              <tr>
                <th>Invoice Number</th>
                <th>Date</th>
                <th>Carrier</th>
                <th>Seller</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="7" style="text-align:center;">Loading data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Right Panel: Category Rules / Seller Type Mappings -->
      <div class="right-panel">
        <div class="card" id="chartCard" style="display: none;">
          <h2>Spending by Category</h2>
          <div style="position: relative; height: 260px; width: 100%;">
            <canvas id="categoryChart"></canvas>
          </div>
        </div>

        <div class="card">
          <h2>Add Manual Expense</h2>
          <form id="manualExpenseForm" class="mapping-form" onsubmit="event.preventDefault(); handleManualSubmit();">
            <div class="form-group">
              <label for="manualAmount">Amount</label>
              <input type="number" id="manualAmount" placeholder="e.g. 150" required min="1">
            </div>
            <div class="form-group">
              <label for="manualType">Type / Category</label>
              <input type="text" id="manualType" placeholder="e.g. food" required>
            </div>
            <div class="form-group">
              <label for="manualDate">Date (Optional)</label>
              <input type="date" id="manualDate">
            </div>
            <div class="form-group">
              <label for="manualSeller">Seller Name (Optional)</label>
              <input type="text" id="manualSeller" placeholder="e.g. Traditional Market">
            </div>
            <button type="submit">Add Expense</button>
          </form>
        </div>

        <div class="card">
          <h2>Seller Type Mappings</h2>

          <form id="mappingForm" class="mapping-form" onsubmit="event.preventDefault(); handleFormSubmit();">
            <div class="form-group">
              <label for="mapSellerName">Seller Name</label>
              <input type="text" id="mapSellerName" placeholder="e.g. Valve Corporation" required>
            </div>
            <div class="form-group">
              <label for="mapType">Type / Category</label>
              <input type="text" id="mapType" placeholder="e.g. Gaming" required>
            </div>
            <button type="submit">Save Mapping</button>
          </form>

          <hr style="border: 0; border-top: 1px solid var(--card-border); margin: 20px 0;">

          <h3>Saved Mappings</h3>
          <div class="form-group search-box">
            <input type="text" id="mappingSearch" placeholder="Search mappings..." oninput="filterMappings()">
          </div>

          <div class="scroll-container">
            <div id="mappingsList">
              <!-- Mappings populated dynamically -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Inject initial JSON result from Flask
    const initialData = {{ result | tojson | safe }};
    let currentInvoices = [];
    let sellerMappings = {};
    let categoryChartInstance = null;

    const categoryColors = {
      'food': '#f87171',
      '餐飲': '#f87171',
      'transportation': '#60a5fa',
      '交通': '#60a5fa',
      'shopping': '#f472b6',
      '購物': '#f472b6',
      'entertainment': '#a78bfa',
      '娛樂': '#a78bfa',
      'utilities': '#34d399',
      '水電': '#34d399',
      'uncategorized': '#64748b',
      '未分類': '#64748b'
    };

    function getCategoryColor(category) {
      const normalized = category.toLowerCase().trim();
      if (categoryColors[normalized]) {
        return categoryColors[normalized];
      }
      let hash = 0;
      for (let i = 0; i < normalized.length; i++) {
        hash = normalized.charCodeAt(i) + ((hash << 5) - hash);
      }
      const h = Math.abs(hash) % 360;
      return `hsl(${h}, 70%, 60%)`;
    }

    function getSellerType(sellerName) {
      if (!sellerName) return "";
      const nameStr = String(sellerName);
      if (sellerMappings[nameStr]) {
        return sellerMappings[nameStr];
      }
      // Vague matching: search if any mapped key is a substring of sellerName
      // Sort keys by length descending to match more specific/longer rules first
      const keys = Object.keys(sellerMappings).sort((a, b) => b.length - a.length);
      for (const key of keys) {
        if (key && nameStr.includes(key)) {
          return sellerMappings[key];
        }
      }
      return "";
    }

    function updateChart() {
      if (typeof Chart === 'undefined') {
        console.warn("Chart.js is not loaded yet.");
        return;
      }
      const categoryTotals = {};
      let totalAmountVal = 0;

      currentInvoices.forEach(item => {
        const type = getSellerType(item.sellerName) || item.type || "Uncategorized";
        const amount = parseFloat(item.totalAmount) || 0;
        categoryTotals[type] = (categoryTotals[type] || 0) + amount;
        totalAmountVal += amount;
      });

      const categories = Object.keys(categoryTotals);

      if (categories.length === 0 || totalAmountVal === 0) {
        document.getElementById('chartCard').style.display = 'none';
        if (categoryChartInstance) {
          categoryChartInstance.destroy();
          categoryChartInstance = null;
        }
        return;
      }

      // Sort categories so Uncategorized is last, others sorted by amount descending
      categories.sort((a, b) => {
        if (a === "Uncategorized") return 1;
        if (b === "Uncategorized") return -1;
        return categoryTotals[b] - categoryTotals[a];
      });

      const dataValues = categories.map(cat => categoryTotals[cat]);
      const backgroundColors = categories.map(cat => getCategoryColor(cat));

      document.getElementById('chartCard').style.display = 'block';
      const ctx = document.getElementById('categoryChart').getContext('2d');

      if (categoryChartInstance) {
        categoryChartInstance.destroy();
      }

      categoryChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: categories,
          datasets: [{
            data: dataValues,
            backgroundColor: backgroundColors,
            borderColor: '#151d30',
            borderWidth: 2,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'right',
              labels: {
                color: '#e2e8f0',
                font: {
                  family: 'Inter',
                  size: 11
                },
                boxWidth: 12,
                padding: 10
              }
            },
            tooltip: {
              callbacks: {
                label: function (context) {
                  const label = context.label || '';
                  const value = context.parsed || 0;
                  const percentage = ((value / totalAmountVal) * 100).toFixed(1);
                  return ` ${label}: $${value} (${percentage}%)`;
                }
              }
            }
          }
        }
      });
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        return new Date(dateStr).toLocaleDateString();
      } catch (e) {
        return dateStr;
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadSavedMonths() {
      try {
        const res = await fetch('/api/saved_months');
        const months = await res.json();
        const select = document.getElementById('monthSelect');

        // Clear except first option
        select.innerHTML = '<option value="">Fetch Live API (Current Month)</option>';

        months.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m;
          opt.innerText = m.replace('_', '-');
          select.appendChild(opt);
        });

        // Set to current month's file if available
        if (months.length > 0) {
          const now = new Date();
          const currentMonthStr = `${now.getFullYear()}_${String(now.getMonth() + 1).padStart(2, '0')}`;
          if (months.includes(currentMonthStr)) {
            select.value = currentMonthStr;
          } else {
            select.value = months[0];
          }
        }
      } catch (e) {
        console.error("Failed to load saved months", e);
      }
    }

    async function loadSellerMappings() {
      try {
        const res = await fetch('/api/seller_types');
        sellerMappings = await res.json();
        renderMappings();
        renderTable();
      } catch (e) {
        console.error("Failed to load seller mappings", e);
      }
    }

    function renderTable() {
      const tbody = document.querySelector('#invoiceTable tbody');
      tbody.innerHTML = "";

      if (currentInvoices && Array.isArray(currentInvoices)) {
        currentInvoices.forEach(item => {
          const tr = document.createElement('tr');
          const type = getSellerType(item.sellerName) || item.type;
          const typeBadge = type
            ? `<span class="type-badge">${escapeHtml(type)}</span>`
            : `<span class="type-badge empty" style="cursor:pointer;" onclick="quickAddMapping('${escapeHtml(item.sellerName)}')">+ Add Type</span>`;

          tr.innerHTML = `
            <td>${escapeHtml(item.invoiceNumber)}</td>
            <td>${formatDate(item.invoiceDate)}</td>
            <td>${escapeHtml(item.carrierName || '')}</td>
            <td>${escapeHtml(item.sellerName)}</td>
            <td>${typeBadge}</td>
            <td>$${item.totalAmount}</td>
            <td><a onclick="postToken('${item.token}')">View Details</a></td>
          `;
          tbody.appendChild(tr);
        });
      } else {
        tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;'>No invoice data found</td></tr>";
      }
      updateChart();
    }

    function renderMappings() {
      const filter = document.getElementById('mappingSearch').value.toLowerCase();
      const container = document.getElementById('mappingsList');
      container.innerHTML = "";

      const keys = Object.keys(sellerMappings).sort();
      let count = 0;

      keys.forEach(seller => {
        const type = sellerMappings[seller];
        if (filter && !seller.toLowerCase().includes(filter) && !type.toLowerCase().includes(filter)) {
          return;
        }

        count++;
        const div = document.createElement('div');
        div.className = 'mapping-item';
        div.innerHTML = `
          <div class="mapping-info">
            <span class="mapping-seller">${escapeHtml(seller)}</span>
            <span class="mapping-type">${escapeHtml(type)}</span>
          </div>
          <button class="btn-danger" style="padding: 4px 8px; font-size: 12px;" onclick="deleteMapping('${escapeHtml(seller)}')">Delete</button>
        `;
        container.appendChild(div);
      });

      if (count === 0) {
        container.innerHTML = `<div style="padding: 16px; text-align: center; color: var(--text-muted); font-size: 13px;">No mappings found</div>`;
      }
    }

    function filterMappings() {
      renderMappings();
    }

    function quickAddMapping(sellerName) {
      document.getElementById('mapSellerName').value = sellerName;
      document.getElementById('mapType').focus();
    }

    async function handleFormSubmit() {
      const sellerName = document.getElementById('mapSellerName').value.trim();
      const type = document.getElementById('mapType').value.trim();
      if (!sellerName || !type) return;

      try {
        const res = await fetch('/api/seller_types', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sellerName, type })
        });
        const result = await res.json();
        if (result.status === 'success') {
          sellerMappings = result.mappings;
          document.getElementById('mapSellerName').value = "";
          document.getElementById('mapType').value = "";
          renderMappings();
          renderTable();
        } else {
          alert("Error saving mapping: " + (result.error || "Unknown error"));
        }
      } catch (e) {
        console.error(e);
        alert("Failed to save mapping");
      }
    }

    async function handleManualSubmit() {
      const amount = document.getElementById('manualAmount').value.trim();
      const type = document.getElementById('manualType').value.trim();
      const date = document.getElementById('manualDate').value;
      const sellerName = document.getElementById('manualSeller').value.trim() || 'Manual Entry';

      if (!amount || !type) return;

      try {
        const res = await fetch('/api/user_save_result', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, type, date, sellerName })
        });
        const result = await res.json();
        if (result.status === 'success') {
          document.getElementById('manualAmount').value = "";
          document.getElementById('manualType').value = "";
          document.getElementById('manualDate').value = "";
          document.getElementById('manualSeller').value = "";
          
          const select = document.getElementById('monthSelect');
          if (select.value) {
            onMonthChange();
          } else {
            const resData = await fetch('/result');
            const data = await resData.json();
            if (data && data.content) {
              currentInvoices = data.content;
              document.getElementById('total').innerText = data.total || 0;
              renderTable();
            }
          }
        } else {
          alert("Error saving manual expense: " + (result.error || "Unknown error"));
        }
      } catch (e) {
        console.error(e);
        alert("Failed to save manual expense");
      }
    }

    async function deleteMapping(sellerName) {
      if (!confirm(`Remove categorization mapping for "${sellerName}"?`)) return;
      try {
        const res = await fetch('/api/seller_types', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sellerName })
        });
        const result = await res.json();
        if (result.status === 'success') {
          sellerMappings = result.mappings;
          renderMappings();
          renderTable();
        } else {
          alert("Error deleting mapping: " + (result.error || "Unknown error"));
        }
      } catch (e) {
        console.error(e);
        alert("Failed to delete mapping");
      }
    }

    async function onMonthChange() {
      const select = document.getElementById('monthSelect');
      const month = select.value;
      if (!month) {
        // Fetch Live (don't load anything automatically, wait for Update button)
        return;
      }

      document.getElementById('result').innerText = "Loading Month Data...";
      try {
        const res = await fetch('/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ month })
        });
        const data = await res.json();
        if (data.error) {
          document.getElementById('result').innerText = "Error: " + data.error;
        } else {
          document.getElementById('result').innerText = "Loaded month data.";
          currentInvoices = data.content || [];
          renderTable();
          document.getElementById('total').innerText = data.total || 0;
        }
      } catch (e) {
        console.error(e);
        document.getElementById('result').innerText = "Error loading month data.";
      }
    }

    async function runScript() {
      const select = document.getElementById('monthSelect');
      const month = select.value;

      if (month) {
        // If a saved month is selected, calling Update Table will reload it
        onMonthChange();
        return;
      }

      // Otherwise fetch live API
      document.getElementById('result').innerText = "Fetching live API data...";
      try {
        const res = await fetch('/run', { method: 'POST' });
        const data = await res.json();
        if (data.error) {
          document.getElementById('result').innerText = "Error: " + data.error;
        } else {
          document.getElementById('result').innerText = "Updated from live API.";
          currentInvoices = data.content || [];
          renderTable();
          document.getElementById('total').innerText = data.total || 0;
          await loadSavedMonths();
        }
      } catch (e) {
        console.error(e);
        document.getElementById('result').innerText = "API Fetch error.";
      }
    }

    function postToken(token) {
      window.open('/token_page?q=' + encodeURIComponent(token), '_blank');
    }

    // Initialize Page
    window.addEventListener('DOMContentLoaded', async () => {
      await loadSellerMappings();
      await loadSavedMonths();

      if (initialData && initialData.content) {
        currentInvoices = initialData.content;
        document.getElementById('total').innerText = initialData.total || 0;
      }
      renderTable();
    });
  </script>
</body>
